version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: randevu-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - randevu-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: randevu-redis
    ports:
      - "6379:6379"
    networks:
      - randevu-network
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: randevu-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_URL=jdbc:postgresql://postgres:5432/postgre_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=prod-only-secure-key-minimum-256-bit-long-key-string-change-this-in-production-12345
    depends_on:
      - postgres
      - redis
    networks:
      - randevu-network
    restart: unless-stopped

networks:
  randevu-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
